<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Athletic Excellence System - Sistema de gestão para escolinhas de futebol">
    <title>{% block title %}Athletic Excellence{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0D2240',
                        'navy-light': '#163561',
                        'navy-dark': '#091828',
                        accent: '#2563EB',
                        'accent-light': '#3B82F6',
                    },
                    fontFamily: {
                        lexend: ['Lexend', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Lexend', sans-serif; }
        body { -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-press { transition: transform 0.1s ease; }
        .btn-press:active { transform: scale(0.97); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-white text-gray-800 min-h-screen">
    <header class="bg-navy text-white py-4 px-5 shadow-lg">
        <div class="max-w-2xl mx-auto flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-accent flex items-center justify-center font-semibold text-sm">AE</div>
            <h1 class="text-lg font-semibold tracking-tight">Athletic Excellence</h1>
        </div>
    </header>
    <main class="max-w-2xl mx-auto px-5 py-8 fade-in">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-xs text-gray-400 py-6">
        &copy; 2026 Athletic Excellence System
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
